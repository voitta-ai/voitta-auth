<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ancient Quranic Supply Chains</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a2332;
    color: #c8d8e8;
    font-family: 'Amiri', Georgia, serif;
    overflow: hidden;
  }

  #map-container {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: radial-gradient(ellipse at center, #1e3a5f 0%, #162d4a 40%, #0f2038 70%, #091428 100%);
  }

  svg {
    width: 100%;
    height: 100%;
  }

  .land {
    fill: #c8b080;
    stroke: #a09060;
    stroke-width: 0.5;
  }

  .title-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 16px 20px 12px;
    background: linear-gradient(180deg, rgba(10,20,40,0.9) 0%, rgba(10,20,40,0.5) 70%, transparent 100%);
    pointer-events: none;
  }

  .title-bar h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: #d4af37;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(212,175,55,0.3), 1px 2px 4px rgba(0,0,0,0.5);
  }

  .title-bar p {
    font-family: 'Amiri', serif;
    font-size: 15px;
    color: #8aadcc;
    font-style: italic;
    margin-top: 2px;
  }

  .legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(10, 20, 40, 0.92);
    border: 1px solid #d4af37;
    border-radius: 8px;
    padding: 14px 16px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    width: 340px;
  }

  .legend h3 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: #d4af37;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(212,175,55,0.4);
    padding-bottom: 6px;
  }

  .legend-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 4px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .legend-item:hover {
    background: rgba(212, 175, 55, 0.15);
  }

  .legend-item.active {
    background: rgba(212, 175, 55, 0.25);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
    border: 1px solid rgba(212,175,55,0.4);
  }

  .legend-text {
    font-size: 13px;
    color: #a0bcd4;
    line-height: 1.3;
  }

  .legend-text strong {
    color: #d4e0ec;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  .legend-text .desc {
    display: block;
    font-size: 11.5px;
    color: #6a8faa;
    font-style: italic;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(10, 20, 40, 0.96);
    border: 1px solid #d4af37;
    border-radius: 6px;
    padding: 10px 14px;
    max-width: 320px;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
  }

  .tooltip h4 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: #d4af37;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .tooltip p {
    font-size: 12.5px;
    color: #a0bcd4;
    line-height: 1.4;
  }

  .tooltip .ref {
    font-size: 11px;
    color: #d4af37;
    font-style: italic;
    margin-top: 4px;
  }

  .marker-pulse {
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; r: 8; }
    50% { opacity: 0.2; r: 14; }
  }

  .route {
    fill: none;
    stroke-width: 2;
    stroke-dasharray: 6, 4;
    opacity: 0.55;
    transition: opacity 0.4s;
  }

  .route.highlighted {
    opacity: 1;
    stroke-width: 3.5;
  }

  .route.dimmed {
    opacity: 0.1;
  }

  .route.disrupted {
    stroke-dasharray: 3, 6;
    opacity: 0.4;
  }

  .route.disrupted.highlighted {
    opacity: 0.8;
    stroke-width: 3.5;
  }

  .route.disrupted.dimmed {
    opacity: 0.08;
  }

  .place-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    fill: #2a1a0a;
    pointer-events: none;
    text-shadow: 0 0 3px #c8b080, 0 0 3px #c8b080, 0 0 3px #c8b080;
  }

  .hint {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 12px;
    color: #d4af37;
    font-style: italic;
    background: rgba(10, 20, 40, 0.8);
    padding: 6px 12px;
    border-radius: 4px;
  }

  /* Geometric border ornament */
  .ornament {
    position: absolute;
    pointer-events: none;
    opacity: 0.15;
  }
  .ornament-tl { top: 8px; left: 8px; }
  .ornament-tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .ornament-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .ornament-br { bottom: 8px; right: 8px; transform: scale(-1,-1); }
</style>
</head>
<body>

<div id="map-container">
  <!-- Corner ornaments -->
  <svg class="ornament ornament-tl" width="60" height="60"><path d="M0,60 L0,0 L60,0" fill="none" stroke="#d4af37" stroke-width="2"/><path d="M0,50 L0,10 L10,0" fill="none" stroke="#d4af37" stroke-width="1"/></svg>
  <svg class="ornament ornament-tr" width="60" height="60"><path d="M0,60 L0,0 L60,0" fill="none" stroke="#d4af37" stroke-width="2"/><path d="M0,50 L0,10 L10,0" fill="none" stroke="#d4af37" stroke-width="1"/></svg>
  <svg class="ornament ornament-bl" width="60" height="60"><path d="M0,60 L0,0 L60,0" fill="none" stroke="#d4af37" stroke-width="2"/><path d="M0,50 L0,10 L10,0" fill="none" stroke="#d4af37" stroke-width="1"/></svg>
  <svg class="ornament ornament-br" width="60" height="60"><path d="M0,60 L0,0 L60,0" fill="none" stroke="#d4af37" stroke-width="2"/><path d="M0,50 L0,10 L10,0" fill="none" stroke="#d4af37" stroke-width="1"/></svg>

  <svg id="map"></svg>
  <div class="title-bar">
    <h1>Supply Chains of the Quran</h1>
    <p>Trade, commerce &amp; provision in the Holy Quran</p>
  </div>
  <div class="legend" id="legend"></div>
  <div class="tooltip" id="tooltip"></div>
  <div class="hint">Click a story to isolate its routes &bull; Hover for details &bull; Scroll to zoom</div>
</div>

<script>
const stories = [
  {
    id: 'quraysh',
    name: "Quraysh Caravans",
    color: '#d4af37',
    desc: "Winter & summer trade routes of Mecca",
    ref: 'Sura 106 (Quraysh)',
    detail: '"For the taming of Qureysh. For their taming [We cause] the caravans to set forth in winter and summer." Winter caravans went south to Yemen; summer caravans north to Syria/Damascus. Mecca was the hub.',
    locations: ['mecca'],
    routes: [['mecca','yemen_aden'], ['mecca','damascus'], ['mecca','medina']],
  },
  {
    id: 'yusuf',
    name: "Yusuf (Joseph)",
    color: '#e6a832',
    desc: "Sold as merchandise, then grain logistics",
    ref: 'Sura 12 (Yusuf)',
    detail: '"They sold him for a low price, a number of silver coins." Joseph purchased in Egypt, rises to manage grain reserves during famine. Brothers come from Canaan: "We bring but poor merchandise, so fill for us the measure."',
    locations: ['egypt_memphis'],
    routes: [['canaan','dothan'], ['dothan','egypt_memphis'], ['canaan','egypt_memphis']],
  },
  {
    id: 'shuayb',
    name: "Shu'ayb & Midian",
    color: '#27ae60',
    desc: "The Fair Trade Prophet — weights & measures",
    ref: 'Suras 7, 11, 26',
    detail: '"O my people! Give full measure and full weight in justice, and wrong not people in respect of their goods." Prophet Shu\'ayb sent specifically to combat trade fraud at Midian. Told three times across three suras. Midianites destroyed for refusing to stop cheating.',
    locations: ['midian'],
    routes: [['midian','mecca'], ['midian','damascus'], ['midian','egypt_memphis']],
  },
  {
    id: 'mutaffifin',
    name: "Al-Mutaffifin (Defrauders)",
    color: '#e74c3c',
    desc: "Entire sura on marketplace fraud",
    ref: 'Sura 83 (Al-Mutaffifin)',
    detail: '"Woe unto the defrauders: Those who when they take the measure from mankind demand it full, But if they measure unto them or weight for them, they cause them loss." A whole sura condemning cheating on weights and measures in trade.',
    locations: [],
    routes: [],
  },
  {
    id: 'garden',
    name: "People of the Garden",
    color: '#9b59b6',
    desc: "Crop destroyed for excluding the poor",
    ref: 'Sura 68 (Al-Qalam)',
    detail: '"They swore that they would pluck its fruit next morning, and made no exception. Then a visitation from thy Lord came upon it while they slept, and in the morning it was as if plucked." Garden owners planned dawn harvest to avoid sharing with the needy. Supply destroyed overnight.',
    locations: [],
    routes: [],
  },
  {
    id: 'solomon_sheba',
    name: "Sulaiman & Queen of Sheba",
    color: '#3498db',
    desc: "Gift diplomacy & trade rejection",
    ref: 'Sura 27 (An-Naml)',
    detail: 'The Queen of Sheba sends diplomatic gifts to Solomon: "I am going to send a present unto them." Solomon rejects the trade offer: "Would ye help me with wealth? But that which Allah hath given me is better." Trade as political instrument.',
    locations: ['jerusalem'],
    routes: [['sheba','jerusalem']],
  },
  {
    id: 'noah',
    name: "Nuh's Ark",
    color: '#8e6d47',
    desc: "Logistics of building & loading",
    ref: 'Suras 11, 23 (Hud, Al-Muminun)',
    detail: '"Load therein two of every kind, a pair... Embark therein! In the name of Allah be its course and its mooring." Provisioning and logistics for an unknown-duration voyage. "And when thou art on board the ship... Praise be to Allah Who hath saved us."',
    locations: ['ararat'],
    routes: [],
  },
  {
    id: 'ships',
    name: "Ships & Maritime Trade",
    color: '#1abc9c',
    desc: "Sea trade as divine provision",
    ref: 'Suras 10, 16, 31, 35',
    detail: '"Thou seest the ship cleaving them with its prow that ye may seek of His bounty." Multiple suras reference ships and maritime trade as God\'s blessing. "The ships glide on the sea by Allah\'s grace." "When ye are in the ships and they sail with a fair breeze."',
    locations: [],
    routes: [['yemen_aden','alexandria'], ['alexandria','tyre'], ['tyre','javan']],
  },
  {
    id: 'hajj_trade',
    name: "Hajj as Trade Fair",
    color: '#f39c12',
    desc: "Pilgrimage & commerce sanctioned together",
    ref: 'Sura 2:198 (Al-Baqara)',
    detail: '"It is no sin for you that ye seek the bounty of your Lord [by trading]." Hajj pilgrimage was historically one of Arabia\'s biggest commercial events. Trade explicitly sanctioned during the sacred journey.',
    locations: ['mecca'],
    routes: [['medina','mecca'], ['yemen_aden','mecca'], ['damascus','mecca']],
  },
  {
    id: 'two_gardens',
    name: "Parable of Two Gardens",
    color: '#e67e22',
    desc: "Agricultural wealth destroyed by arrogance",
    ref: 'Sura 18:32-44 (Al-Kahf)',
    detail: '"His fruit was beset with destruction. Then began he to wring his hands for all that he had spent upon it, when now it was all ruined on its trellises." A wealthy man\'s garden destroyed when he boasted and denied the afterlife. Supply chain parable about hubris.',
    locations: [],
    routes: [],
  },
  {
    id: 'contract_law',
    name: "Quranic Contract Law",
    color: '#a0bcd4',
    desc: "Written contracts & witnesses for trade",
    ref: 'Sura 2:282 (Al-Baqara)',
    detail: '"When ye contract a debt for a fixed term, record it in writing... And have witnesses when ye sell one to another, and let no harm be done to scribe or witness." The longest verse in the Quran — entirely about commercial documentation and contract law.',
    locations: [],
    routes: [],
  },
  {
    id: 'dawud_iron',
    name: "Dawud's Iron Works",
    color: '#c0392b',
    desc: "Divine manufacturing — coats of mail",
    ref: 'Sura 34:10-11 (Saba)',
    detail: '"We made the iron supple unto him, Saying: Make thou long coats of mail and measure the links thereof." David as ironsmith-king — God softened iron for him to manufacture armor. Precision manufacturing with quality control ("measure the links").',
    locations: ['jerusalem'],
    routes: [],
  },
  {
    id: 'dhul_qarnayn',
    name: "Dhul-Qarnayn's Iron Wall",
    color: '#7f8c8d',
    desc: "Mega-project: iron & copper barrier",
    ref: 'Sura 18:94-97 (Al-Kahf)',
    detail: '"Give me pieces of iron — till, when he had levelled up the gap between the cliffs, he said: Blow! — till, when he had made it a fire, he said: Bring me molten copper to pour thereon." Sourced iron and copper, mobilized labor, built a barrier between two mountains against Gog & Magog.',
    locations: ['caucasus'],
    routes: [],
  },
  {
    id: 'sleepers',
    name: "Sleepers of the Cave",
    color: '#8e44ad',
    desc: "Covert procurement mission with silver",
    ref: 'Sura 18:19-20 (Al-Kahf)',
    detail: '"Send one of you with this your silver coin unto the city, and let him see what food is purest there and bring you a supply thereof. Let him be courteous and let no man know of you." A stealth procurement operation — evaluate quality, use currency, maintain operational security.',
    locations: ['ephesus'],
    routes: [],
  },
  {
    id: 'qarun',
    name: "Qarun's Hoard",
    color: '#d35400',
    desc: "Wealth so vast the keys burdened strong men",
    ref: 'Sura 28:76-82 (Al-Qasas)',
    detail: '"We gave him so much treasure that the stores thereof would verily have been a burden for a troop of mighty men." Qarun (Korah) hoarded extreme wealth in Egypt. People envied him. God caused the earth to swallow him and his treasure. Anti-hoarding, anti-monopoly parable.',
    locations: ['egypt_memphis'],
    routes: [],
  },
  {
    id: 'manna_quran',
    name: "Manna, Quails & 12 Springs",
    color: '#f1c40f',
    desc: "JIT divine provision in the wilderness",
    ref: 'Suras 20:80, 7:160, 2:57',
    detail: '"We sent down on you the manna and the quails: Eat of the good things wherewith We have provided you." Also: "Smite with thy staff the rock. And there gushed out therefrom twelve springs so that each tribe knew their drinking-place." Distribution logistics for 12 tribes.',
    locations: ['sinai'],
    routes: [],
  },
  {
    id: 'riba',
    name: "Prohibition of Riba (Usury)",
    color: '#16a085',
    desc: "Trade permitted, interest forbidden",
    ref: 'Sura 2:275-279 (Al-Baqara)',
    detail: '"Allah permitteth trading and forbiddeth usury." "Allah hath blighted usury and made almsgiving fruitful." Explicitly distinguishes legitimate commerce from predatory lending. Foundational principle of Islamic finance and supply chain financing.',
    locations: [],
    routes: [],
  },
];

const places = {
  mecca:          { name: 'Mecca',              lon: 39.83, lat: 21.42 },
  medina:         { name: 'Medina',             lon: 39.61, lat: 24.47 },
  yemen_aden:     { name: 'Yemen (Aden)',       lon: 45.04, lat: 12.80 },
  damascus:       { name: 'Damascus',           lon: 36.29, lat: 33.51 },
  jerusalem:      { name: 'Jerusalem',          lon: 35.23, lat: 31.77 },
  egypt_memphis:  { name: 'Egypt (Memphis)',    lon: 31.25, lat: 29.85 },
  midian:         { name: 'Midian',             lon: 36.50, lat: 28.50 },
  canaan:         { name: 'Canaan',             lon: 35.30, lat: 32.50 },
  dothan:         { name: 'Dothan',             lon: 35.40, lat: 32.40 },
  sheba:          { name: 'Sheba',              lon: 45.50, lat: 15.40 },
  ararat:         { name: 'Mt. Ararat',         lon: 44.30, lat: 39.70 },
  tyre:           { name: 'Tyre',               lon: 35.20, lat: 33.27 },
  alexandria:     { name: 'Alexandria',         lon: 29.92, lat: 31.20 },
  javan:          { name: 'Javan (Greece)',      lon: 23.70, lat: 37.90 },
  caucasus:       { name: 'Caucasus (Wall)',     lon: 46.00, lat: 42.00 },
  ephesus:        { name: 'Ephesus (Cave)',      lon: 27.34, lat: 37.94 },
  sinai:          { name: 'Sinai Wilderness',    lon: 33.97, lat: 28.55 },
};

// Collect which places are used
const usedPlaces = new Set();
stories.forEach(s => {
  s.locations.forEach(l => usedPlaces.add(l));
  s.routes.forEach(r => { usedPlaces.add(r[0]); usedPlaces.add(r[1]); });
});

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#map')
  .attr('width', width)
  .attr('height', height);

// Background water — deep blue-teal
svg.append('rect')
  .attr('width', width)
  .attr('height', height)
  .attr('fill', '#1a3a5c')
  .attr('opacity', 0.5);

const projection = d3.geoMercator()
  .center([37, 28])
  .scale(Math.min(width, height) * 1.9)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const g = svg.append('g');

// Decorative compass
const compassG = svg.append('g')
  .attr('transform', `translate(${width - 80}, 100)`);
compassG.append('circle').attr('r', 25).attr('fill', 'none').attr('stroke', '#d4af37').attr('stroke-width', 1).attr('opacity', 0.5);
compassG.append('text').text('N').attr('text-anchor', 'middle').attr('y', -30)
  .attr('font-family', 'Cinzel, serif').attr('font-size', 14).attr('fill', '#d4af37').attr('opacity', 0.6);
compassG.append('line').attr('x1', 0).attr('y1', -20).attr('x2', 0).attr('y2', 20)
  .attr('stroke', '#d4af37').attr('stroke-width', 1.5).attr('opacity', 0.4);
compassG.append('line').attr('x1', -20).attr('y1', 0).attr('x2', 20).attr('y2', 0)
  .attr('stroke', '#d4af37').attr('stroke-width', 1.5).attr('opacity', 0.4);
compassG.append('polygon').attr('points', '0,-22 -4,-14 4,-14').attr('fill', '#d4af37').attr('opacity', 0.5);

// 8-pointed star (Islamic geometric motif) in compass
const starR = 10, starIR = 5;
let starPath = '';
for (let i = 0; i < 8; i++) {
  const angle = (i * Math.PI / 4) - Math.PI / 2;
  const innerAngle = angle + Math.PI / 8;
  const ox = Math.cos(angle) * starR;
  const oy = Math.sin(angle) * starR;
  const ix = Math.cos(innerAngle) * starIR;
  const iy = Math.sin(innerAngle) * starIR;
  starPath += (i === 0 ? 'M' : 'L') + ox + ',' + oy + ' L' + ix + ',' + iy + ' ';
}
starPath += 'Z';
compassG.append('path').attr('d', starPath).attr('fill', 'none').attr('stroke', '#d4af37').attr('stroke-width', 0.8).attr('opacity', 0.4);

// Load world map
const worldUrl = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';

d3.json(worldUrl).then(world => {
  const countries = topojson.feature(world, world.objects.countries);

  // Draw land — sandy/desert tones
  g.selectAll('.land')
    .data(countries.features)
    .join('path')
    .attr('class', 'land')
    .attr('d', path)
    .attr('fill', (d, i) => {
      const fills = ['#c8b080', '#bfa874', '#d0b888', '#b8a070'];
      return fills[i % fills.length];
    });

  // Sea labels
  const seaLabels = [
    { name: 'Mediterranean Sea', lon: 22, lat: 35.5, size: 13 },
    { name: 'Red Sea', lon: 38.5, lat: 22, size: 11 },
    { name: 'Persian Gulf', lon: 50, lat: 27, size: 10 },
    { name: 'Arabian Sea', lon: 58, lat: 18, size: 11 },
    { name: 'Indian Ocean', lon: 62, lat: 10, size: 11 },
  ];

  g.selectAll('.sea-label')
    .data(seaLabels)
    .join('text')
    .attr('class', 'sea-label')
    .attr('x', d => projection([d.lon, d.lat])[0])
    .attr('y', d => projection([d.lon, d.lat])[1])
    .text(d => d.name)
    .attr('font-family', 'Amiri, serif')
    .attr('font-size', d => d.size)
    .attr('fill', '#4a7a96')
    .attr('opacity', 0.45)
    .attr('font-style', 'italic')
    .attr('text-anchor', 'middle');

  // Region labels
  const regionLabels = [
    { name: 'ARABIA', lon: 44, lat: 23, size: 16 },
    { name: 'EGYPT', lon: 30, lat: 27, size: 12 },
    { name: 'SYRIA', lon: 37, lat: 35, size: 11 },
    { name: 'YEMEN', lon: 47, lat: 15, size: 11 },
  ];

  g.selectAll('.region-label')
    .data(regionLabels)
    .join('text')
    .attr('x', d => projection([d.lon, d.lat])[0])
    .attr('y', d => projection([d.lon, d.lat])[1])
    .text(d => d.name)
    .attr('font-family', 'Cinzel, serif')
    .attr('font-size', d => d.size)
    .attr('fill', '#6a5030')
    .attr('opacity', 0.25)
    .attr('text-anchor', 'middle')
    .attr('letter-spacing', 6);

  // Route layer
  const routeLayer = g.append('g').attr('class', 'routes');

  // Draw all routes
  stories.forEach(story => {
    story.routes.forEach(([fromId, toId]) => {
      const from = places[fromId];
      const to = places[toId];
      if (!from || !to) return;

      const p1 = projection([from.lon, from.lat]);
      const p2 = projection([to.lon, to.lat]);
      const midX = (p1[0] + p2[0]) / 2;
      const midY = (p1[1] + p2[1]) / 2;
      const dx = p2[0] - p1[0];
      const dy = p2[1] - p1[1];
      const dist = Math.sqrt(dx * dx + dy * dy);
      const offset = dist * 0.15;
      const cx = midX - (dy / dist) * offset;
      const cy = midY + (dx / dist) * offset;

      const isDisrupted = story.disrupted;

      routeLayer.append('path')
        .attr('class', `route route-${story.id}${isDisrupted ? ' disrupted' : ''}`)
        .attr('d', `M${p1[0]},${p1[1]} Q${cx},${cy} ${p2[0]},${p2[1]}`)
        .attr('stroke', story.color)
        .attr('stroke-width', 2.5);
    });
  });

  // Place markers
  const markerLayer = g.append('g').attr('class', 'markers');

  // Determine colors per place
  const placeColors = {};
  Object.keys(places).forEach(pid => {
    if (!usedPlaces.has(pid)) return;
    const story = stories.find(s =>
      s.locations.includes(pid) || s.routes.some(r => r.includes(pid))
    );
    placeColors[pid] = story ? story.color : '#d4af37';
  });

  // Which places are primary story locations
  const storyPlaces = new Set();
  stories.forEach(s => s.locations.forEach(l => storyPlaces.add(l)));

  const placeData = Object.entries(places)
    .filter(([id]) => usedPlaces.has(id))
    .map(([id, p]) => ({ id, ...p, pos: projection([p.lon, p.lat]) }));

  // Pulse rings for story locations
  markerLayer.selectAll('.pulse')
    .data(placeData.filter(p => storyPlaces.has(p.id)))
    .join('circle')
    .attr('class', 'marker-pulse')
    .attr('cx', d => d.pos[0])
    .attr('cy', d => d.pos[1])
    .attr('r', 8)
    .attr('fill', d => placeColors[d.id])
    .attr('opacity', 0.4)
    .style('animation-delay', (d, i) => `${i * 0.3}s`);

  // Main dots
  markerLayer.selectAll('.dot')
    .data(placeData)
    .join('circle')
    .attr('class', d => `dot dot-${d.id}`)
    .attr('cx', d => d.pos[0])
    .attr('cy', d => d.pos[1])
    .attr('r', d => storyPlaces.has(d.id) ? 5 : 3.5)
    .attr('fill', d => placeColors[d.id])
    .attr('stroke', '#0a1428')
    .attr('stroke-width', 1.5)
    .attr('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      const relatedStories = stories.filter(s =>
        s.locations.includes(d.id) || s.routes.some(r => r.includes(d.id))
      );
      if (relatedStories.length === 0) return;

      const tooltip = d3.select('#tooltip');
      const names = relatedStories.map(s => `<strong>${s.name}</strong> (${s.ref})`).join('<br>');
      tooltip.html(`<h4>${d.name}</h4><p>${names}</p>`)
        .style('opacity', 1)
        .style('left', (event.pageX + 12) + 'px')
        .style('top', (event.pageY - 10) + 'px');

      d3.select(this).transition().duration(200).attr('r', storyPlaces.has(d.id) ? 8 : 6);
    })
    .on('mouseout', function(event, d) {
      d3.select('#tooltip').style('opacity', 0);
      d3.select(this).transition().duration(200).attr('r', storyPlaces.has(d.id) ? 5 : 3.5);
    });

  // Place labels
  markerLayer.selectAll('.place-label')
    .data(placeData)
    .join('text')
    .attr('class', 'place-label')
    .attr('x', d => d.pos[0] + 8)
    .attr('y', d => d.pos[1] + 3)
    .text(d => d.name)
    .attr('font-size', d => storyPlaces.has(d.id) ? 11 : 9)
    .attr('font-weight', d => storyPlaces.has(d.id) ? 600 : 400);

  // Build legend
  const legend = d3.select('#legend');
  legend.append('h3').text('Stories');

  let activeStory = null;

  stories.forEach(story => {
    const item = legend.append('div')
      .attr('class', 'legend-item')
      .attr('data-story', story.id)
      .on('click', function() {
        const wasActive = activeStory === story.id;
        legend.selectAll('.legend-item').classed('active', false);
        svg.selectAll('.route').classed('highlighted', false).classed('dimmed', false);

        if (wasActive) {
          activeStory = null;
        } else {
          activeStory = story.id;
          d3.select(this).classed('active', true);
          svg.selectAll('.route').classed('dimmed', true);
          svg.selectAll(`.route-${story.id}`)
            .classed('dimmed', false)
            .classed('highlighted', true);
        }
      })
      .on('mouseover', function() {
        const tooltip = d3.select('#tooltip');
        tooltip.html(`<h4>${story.name}</h4><p>${story.detail}</p><div class="ref">${story.ref}</div>`)
          .style('opacity', 1);

        const rect = this.getBoundingClientRect();
        tooltip
          .style('left', (rect.right + 10) + 'px')
          .style('top', rect.top + 'px');

        story.locations.forEach(loc => {
          svg.select(`.dot-${loc}`).transition().duration(200).attr('r', 8);
        });
      })
      .on('mouseout', function() {
        d3.select('#tooltip').style('opacity', 0);
        story.locations.forEach(loc => {
          svg.select(`.dot-${loc}`).transition().duration(200).attr('r', storyPlaces.has(loc) ? 5 : 3.5);
        });
      });

    item.append('div')
      .attr('class', 'legend-dot')
      .style('background', story.color);

    const textDiv = item.append('div').attr('class', 'legend-text');
    textDiv.append('strong').text(story.name);
    textDiv.append('span').attr('class', 'desc').text(story.desc);
  });

  // Zoom behavior
  const zoom = d3.zoom()
    .scaleExtent([0.5, 8])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });

  svg.call(zoom);

}).catch(err => {
  console.error('Failed to load map data:', err);
  svg.append('text')
    .attr('x', width / 2)
    .attr('y', height / 2)
    .attr('text-anchor', 'middle')
    .attr('fill', '#d4af37')
    .attr('font-size', 18)
    .text('Failed to load map. Check internet connection and try again.');
});
</script>
</body>
</html>
